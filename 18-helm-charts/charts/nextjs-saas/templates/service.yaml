# EP18 — Kubernetes Service.
# A Service gives your pods a stable internal IP address and DNS name.
# Other services in the cluster reach your app via: http://{{ .Release.Name }}:80
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
  selector:
    app: {{ .Release.Name }}
